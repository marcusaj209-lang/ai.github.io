<script>
const knowledgeBase = [
  {
    keywords: ["timeline", "history", "beginning"],
    answer: "AI voice technology began in the 1950s with basic speech synthesis and evolved through deep learning breakthroughs in 2016."
  },
  {
    keywords: ["2016", "deep learning"],
    answer: "In 2016, deep learning revolutionized AI voice generation, making speech much more natural."
  },
  {
    keywords: ["technology", "how"],
    answer: "AI voice technology uses text-to-speech, machine learning, and neural networks to generate realistic speech."
  },
  {
    keywords: ["voice cloning"],
    answer: "Voice cloning allows AI to replicate a person's voice using short audio samples."
  },
  {
    keywords: ["real time", "assistant"],
    answer: "Modern AI can generate speech in real time, enabling virtual assistants and live conversations."
  }
];

function sendMessage() {
    let input = document.getElementById("user-input");
    let chatBox = document.getElementById("chat-box");

    let userText = input.value.toLowerCase();
    if (userText === "") return;

    chatBox.innerHTML += "<p><b>You:</b> " + userText + "</p>";

    let response = findBestAnswer(userText);

    chatBox.innerHTML += "<p><b>AI:</b> " + response + "</p>";

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
}

function findBestAnswer(input) {
    for (let item of knowledgeBase) {
        for (let keyword of item.keywords) {
            if (input.includes(keyword)) {
                return item.answer;
            }
        }
    }
    return "I’m not sure, but check the timeline or technology section for more info!";
}
</script>
